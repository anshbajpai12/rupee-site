<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My AI Assistant</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #chat-container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            height: 80vh;
            overflow: hidden;
        }
        #chat-header {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }
        #chat-history {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            padding: 12px 16px;
            border-radius: 8px;
            max-width: 80%;
            line-height: 1.4;
        }
        .user-message {
            background-color: #3498db;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }
        .ai-message {
            background-color: #ecf0f1;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }
        #input-area {
            display: flex;
            padding: 15px;
            border-top: 1px solid #ddd;
            background-color: #fafafa;
        }
        #user-input {
            flex-grow: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
        }
        #user-input:focus {
            border-color: #3498db;
        }
        #send-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 0 20px;
            margin-left: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }
        #send-btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-header">Groq AI Assistant</div>
    <div id="chat-history">
        <div class="message ai-message">Hello! How can I help you today?</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Ask a question..." autocomplete="off">
        <button id="send-btn">Send</button>
    </div>
</div>

<script>
    // ⚠️ REPLACE THIS WITH A NEW KEY. DO NOT UPLOAD TO A PUBLIC GITHUB REPO.
    const GROQ_API_KEY = 'PASTE_YOUR_NEW_KEY_HERE'; 

    const chatHistory = document.getElementById('chat-history');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // 1. Add user message to UI
        appendMessage(text, 'user');
        userInput.value = '';

        // 2. Add temporary loading message
        const loadingId = appendMessage('Thinking...', 'ai');

        try {
            // 3. Call Groq API
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${GROQ_API_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: "llama3-8b-8192", // You can change this to another Groq model
                    messages: [{ role: "user", content: text }]
                })
            });

            const data = await response.json();
            
            // 4. Replace loading text with actual response
            const aiMessageElement = document.getElementById(loadingId);
            if (data.choices && data.choices.length > 0) {
                aiMessageElement.innerText = data.choices[0].message.content;
            } else {
                aiMessageElement.innerText = "Sorry, I received an unexpected response.";
            }

        } catch (error) {
            console.error("Error:", error);
            document.getElementById(loadingId).innerText = "Error: Could not connect to the API. Check your API key and network.";
        }
    }

    function appendMessage(text, sender) {
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message');
        messageDiv.classList.add(sender === 'user' ? 'user-message' : 'ai-message');
        
        // Generate a unique ID for loading states
        const id = 'msg-' + Date.now();
        messageDiv.id = id;
        
        messageDiv.innerText = text;
        chatHistory.appendChild(messageDiv);
        
        // Auto-scroll to bottom
        chatHistory.scrollTop = chatHistory.scrollHeight;
        
        return id;
    }

    // Event Listeners
    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>

</body>
</html>
